name: Build Windows Release
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      release_version:
        description: Semantic version matching VERSION.txt
        required: true
        type: string
permissions:
  contents: read
concurrency:
  group: release-build-${{ github.ref }}
  cancel-in-progress: false
jobs:
  release:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Resolve and validate version
        id: version
        shell: pwsh
        run: |
          $version = if ('${{ github.event_name }}' -eq 'workflow_dispatch') { '${{ inputs.release_version }}' } else { '${{ github.ref_name }}'.TrimStart('v') }
          if ($version -notmatch '^\d+\.\d+\.\d+$') { throw 'Invalid semantic release version' }
          if ($version -ne (Get-Content VERSION.txt -Raw).Trim()) { throw 'Tag/input and VERSION.txt disagree' }
          "version=$version" >> $env:GITHUB_OUTPUT
      - uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: build/windows-x64/_deps
          key: juce-${{ runner.os }}-x64-msvc-release-8.0.14-${{ hashFiles('CMakeLists.txt', 'cmake/*.cmake') }}
      - name: Configure clean Windows x64 build
        shell: pwsh
        run: ./scripts/github-configure.ps1
      - name: Build all Release targets
        shell: pwsh
        run: ./scripts/github-build.ps1
      - name: Run extended tests
        shell: pwsh
        run: ./scripts/github-test.ps1 -Extended
      - name: Attempt VST3 validation
        shell: pwsh
        run: ./scripts/validate-vst3.ps1
      - name: Provision pinned Inno Setup
        shell: pwsh
        run: choco install innosetup --version=6.2.2 --yes --no-progress
      - name: Package, checksum, and verify
        shell: pwsh
        run: ./scripts/github-package.ps1 -Version '${{ steps.version.outputs.version }}' -RequireInstaller
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: AuroraBroadcastProcessor-Windows-x64-Release-v${{ steps.version.outputs.version }}
          path: |
            dist/AuroraBroadcastProcessor-Windows-x64-v${{ steps.version.outputs.version }}.zip
            dist/AuroraBroadcastProcessor-VST3-v${{ steps.version.outputs.version }}.zip
            dist/AuroraBroadcastProcessor-Standalone-v${{ steps.version.outputs.version }}.zip
            dist/AuroraBroadcastProcessor-Setup-v${{ steps.version.outputs.version }}.exe
            dist/AuroraBroadcastProcessor-Checksums-v${{ steps.version.outputs.version }}.txt
            dist/AuroraBroadcastProcessor-ReleaseManifest-v${{ steps.version.outputs.version }}.json
            dist/AuroraBroadcastProcessor-TestResults-v${{ steps.version.outputs.version }}.zip
          if-no-files-found: error
          retention-days: 30
      - name: Release summary
        shell: pwsh
        run: |
          "## Verified Windows release`nVersion: ${{ steps.version.outputs.version }}`nConfiguration: Release`nArchitecture: x64`nSigning: UNSIGNED" >> $env:GITHUB_STEP_SUMMARY
